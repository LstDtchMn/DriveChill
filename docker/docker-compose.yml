version: "3.9"

services:
  drivechill:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: drivechill
    ports:
      - "8085:8085"
    volumes:
      - drivechill_data:/app/data
    environment:
      - DRIVECHILL_HARDWARE_BACKEND=auto
      - DRIVECHILL_SENSOR_POLL_INTERVAL=1.0
      - DRIVECHILL_HISTORY_RETENTION_HOURS=168
    # Preferred locked-down profile. Add explicit device mappings only when needed.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8085/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  drivechill_data:

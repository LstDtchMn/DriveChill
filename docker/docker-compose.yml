services:
  drivechill:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: drivechill
    ports:
      - "${DRIVECHILL_PORT:-8085}:${DRIVECHILL_PORT:-8085}"
    volumes:
      - drivechill_data:${DRIVECHILL_DATA_DIR:-/app/data}
    environment:
      # SECURITY: 0.0.0.0 exposes the service on all interfaces. The backend
      # will refuse to start unless DRIVECHILL_PASSWORD is set or users already
      # exist in the database. See docs/secure-deployment.md for guidance.
      DRIVECHILL_HOST: ${DRIVECHILL_HOST:-0.0.0.0}
      DRIVECHILL_PORT: ${DRIVECHILL_PORT:-8085}
      DRIVECHILL_DATA_DIR: ${DRIVECHILL_DATA_DIR:-/app/data}
      DRIVECHILL_HARDWARE_BACKEND: ${DRIVECHILL_HARDWARE_BACKEND:-auto}
      DRIVECHILL_SENSOR_POLL_INTERVAL: ${DRIVECHILL_SENSOR_POLL_INTERVAL:-1.0}
      DRIVECHILL_HISTORY_RETENTION_HOURS: ${DRIVECHILL_HISTORY_RETENTION_HOURS:-168}
      DRIVECHILL_PASSWORD: ${DRIVECHILL_PASSWORD:-}
      DRIVECHILL_FORCE_AUTH: ${DRIVECHILL_FORCE_AUTH:-false}
      DRIVECHILL_SESSION_TTL: ${DRIVECHILL_SESSION_TTL:-8h}
      DRIVECHILL_SSL_GENERATE_SELF_SIGNED: ${DRIVECHILL_SSL_GENERATE_SELF_SIGNED:-false}
      DRIVECHILL_SSL_CERTFILE: ${DRIVECHILL_SSL_CERTFILE:-}
      DRIVECHILL_SSL_KEYFILE: ${DRIVECHILL_SSL_KEYFILE:-}
      DRIVECHILL_TEMP_UNIT: ${DRIVECHILL_TEMP_UNIT:-C}
      DRIVECHILL_ALLOW_PRIVATE_OUTBOUND_TARGETS: ${DRIVECHILL_ALLOW_PRIVATE_OUTBOUND_TARGETS:-false}
      DRIVECHILL_SECRET_KEY: ${DRIVECHILL_SECRET_KEY:-}
      DRIVECHILL_VAPID_PUBLIC_KEY: ${DRIVECHILL_VAPID_PUBLIC_KEY:-}
      DRIVECHILL_VAPID_PRIVATE_KEY: ${DRIVECHILL_VAPID_PRIVATE_KEY:-}
      DRIVECHILL_VAPID_CONTACT_EMAIL: ${DRIVECHILL_VAPID_CONTACT_EMAIL:-admin@localhost}
      DRIVECHILL_PROMETHEUS_ENABLED: ${DRIVECHILL_PROMETHEUS_ENABLED:-false}
    # Drive monitoring: smartctl requires read access to block devices.
    # By default the container runs without extra capabilities and drive
    # monitoring operates in degraded mode (no SMART data, no temperature).
    # To enable full drive monitoring, choose ONE of:
    #
    #   Option A — map specific block devices (least privilege):
    #     devices:
    #       - "/dev/sda:/dev/sda:r"
    #       - "/dev/nvme0:/dev/nvme0:r"
    #     cap_add:
    #       - SYS_RAWIO
    #
    #   Option B — use docker-compose.privileged.yml (grants full host access).
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port=os.environ.get('DRIVECHILL_PORT','8085'); urllib.request.urlopen(f'http://127.0.0.1:{port}/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  drivechill_data:

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # v2.1.0, v2.1.0-rc1, etc.

permissions:
  contents: write   # create GitHub Release + upload assets
  packages: write   # push to ghcr.io

jobs:
  # ─── 1. Build frontend ────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build static export
        run: npm run build
        working-directory: frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  # ─── 2. Python + frontend ZIP ─────────────────────────────────────────────
  build-python-zip:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download frontend artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: frontend-out
          path: frontend/out/

      - name: Create Python release ZIP
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIST=DriveChill-python-${VERSION}
          mkdir -p ${DIST}/frontend
          cp -r backend          ${DIST}/
          cp -r frontend/out     ${DIST}/frontend/out
          cp -r scripts          ${DIST}/
          cp -r docker           ${DIST}/
          [ -f README.md ] && cp README.md ${DIST}/
          [ -f CHANGELOG.md ] && cp CHANGELOG.md ${DIST}/
          zip -r DriveChill-python-${VERSION}.zip ${DIST}/

      - name: Upload Python ZIP artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: python-zip
          path: DriveChill-python-*.zip
          retention-days: 1

  # ─── 3. C# self-contained Windows x64 ────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download frontend artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: frontend-out
          path: frontend/out/

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained Windows x64
        run: >
          dotnet publish backend-cs/DriveChill.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:EmbedManifest=true
          -o publish/windows

      - name: Create Windows ZIP
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $dest    = "DriveChill-windows-$version"
          New-Item -ItemType Directory -Path $dest | Out-Null
          Copy-Item publish/windows/* $dest/ -Recurse
          # Bundle install/update scripts alongside the exe
          Copy-Item scripts $dest/scripts -Recurse
          Compress-Archive -Path "$dest/*" -DestinationPath "DriveChill-windows-$version.zip"

      - name: Upload Windows ZIP artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: windows-zip
          path: DriveChill-windows-*.zip
          retention-days: 1

  # ─── 4. Docker image → ghcr.io ────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/drivechill
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── 5. Create GitHub Release ─────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-python-zip, build-windows, docker]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## Installation

            **Windows (C# native app)**
            Download `DriveChill-windows-*.zip`, extract, and run `DriveChill.exe`.

            **Windows / Linux (Python)**
            Download `DriveChill-python-*.zip`, extract, and run `scripts/install_windows.ps1` (Windows) or `scripts/install_linux.sh` (Linux).

            **Docker**
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/drivechill:${{ github.ref_name }}
            ```
            Or update your `docker-compose.yml` image tag and run `docker compose pull && docker compose up -d`.

            ## Updating from a previous version
            Run `scripts/update_windows.ps1` (as Administrator) or see the [update docs](docs/updating.md).

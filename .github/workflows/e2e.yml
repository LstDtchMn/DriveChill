name: E2E Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install Python backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start mock backend
        run: |
          cd backend
          DRIVECHILL_HARDWARE_BACKEND=mock python drivechill.py --headless &
          # Wait up to 30 s for the backend to accept connections
          timeout 30 bash -c 'until curl -sf http://localhost:8085/api/sensors 2>/dev/null; do sleep 1; done' \
            || (echo "Backend did not start in time" && exit 1)
        env:
          DRIVECHILL_DATA_DIR: /tmp/drivechill-e2e

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          # Playwright webServer block starts `next dev` pointing at the mock backend.
          # NODE_OPTIONS guards against memory pressure during compilation.
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0efa2083  # v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

name: Security Regressions

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-security-regressions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-asyncio

      - name: Run backend security regression tests
        run: |
          pytest -q \
            backend/tests/test_api_keys.py \
            backend/tests/test_api_key_scopes.py \
            backend/tests/test_security_regressions.py \
            backend/tests/test_webhooks.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
